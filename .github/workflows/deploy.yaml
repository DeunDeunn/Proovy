name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - "proovy/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./proovy
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKER_USERNAME }}/proovy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: EC2에 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            docker network create app-network 2>/dev/null || true
            docker network connect app-network redis 2>/dev/null || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/proovy:latest
            docker stop proovy || true
            docker rm proovy || true
            docker run -d --name proovy --restart unless-stopped --network app-network -p 8080:8080 --env-file /home/ec2-user/.env ${{ secrets.DOCKER_USERNAME }}/proovy:latest
