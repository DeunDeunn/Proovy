<!-- src/main/resources/static/naverpay-test.html -->
<script src="https://nsp.pay.naver.com/sdk/js/naverpay.min.js"></script>
<button onclick="charge()">10,000원 충전</button>
<script>
  async function charge() {
    const res = await fetch('/api/wallets/charge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount: 10000 })
    });
    const { data } = await res.json();

    const oPay = Naver.Pay.create({ mode: 'development', clientId: 'HN3GGCMDdTgGUfl0kFCo', chainId: 'bGRPcmhVbFBGVGZ' });

    sessionStorage.setItem('merchantPayKey', data.merchantPayKey);

    oPay.open({
      merchantPayKey: data.merchantPayKey,
      productName: data.productName,
      productCount: data.productCount,
      totalPayAmount: data.totalPayAmount,
      taxScopeAmount: data.taxScopeAmount,
      taxExScopeAmount: data.taxExScopeAmount,
      returnUrl: location.origin + '/naverpay-test.html' // 아래 콜백 처리랑 같은 페이지로 돌아오게
    });
  }

  // 팝업 완료 후 returnUrl로 돌아왔을 때 (쿼리 파라미터로 paymentId 등이 붙어서 옴)
  const params = new URLSearchParams(location.search);
  if (params.get('resultCode')) {
    const merchantPayKey = sessionStorage.getItem('merchantPayKey'); // ★ URL이 아니라 여기서 꺼내기
    fetch('/api/payments/naverpay/callback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ merchantPayKey, paymentId: params.get('paymentId') })
    }).then(r => r.json()).then(console.log);
  }
</script>
